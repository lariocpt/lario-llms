version: '3.8'

services:
  bifrost:
    # Bifrost acts as the gateway and orchestrator, routing requests to the appropriate 
    # llama.cpp server and managing memory by swapping models as needed.
    image: maximhq/bifrost:latest
    container_name: bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost-data:/app/data
    restart: unless-stopped
    networks:
      - ai-network

  chromadb:
    # ChromaDB is the Vector Database. This is CRITICAL for the Hermes agent to
    # store long-term knowledge, RAG data, and learn your specific engineering workflows.
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - ai-network

  hermes-daniels-specialist:
    # This is Daniel's self-improving Work Specialist agent.
    # It points its memory and workspace to the 'agents/Daniels-Work-Specialist' folder.
    image: nousresearch/hermes-agent:latest
    container_name: hermes-daniels-specialist
    env_file: [{ path: ./agents/Daniels-Work-Specialist/.env.example, required: false }]
    volumes:
      - ./agents/Daniels-Work-Specialist:/opt/data
      - ./agents/Daniels-Work-Specialist/workspace:/workspace
    environment:
      OPENAI_API_KEY: local-bifrost
    command: ["gateway", "run"]
    depends_on:
      - bifrost
      - chromadb
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    name: ai-network
    driver: bridge
