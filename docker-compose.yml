services:
  llamacpp:
    # LEGACY — the LLM backend is now NATIVE llama-swap on the host (:11434). This container
    # (Ollama-fork ROCm 7.2.1 + gfx1102 spoof) is retired and guarded behind a profile so
    # `restart: unless-stopped` and `start_all.sh`'s bare `docker compose up` can't resurrect it.
    # To run it deliberately (emergency fallback): docker compose --profile legacy-container up -d llamacpp
    profiles: ["legacy-container"]
    build: ./llama-cpp
    image: lario/llamacpp:latest
    container_name: llamacpp
    command: ["llama-swap", "-config", "/config/config.yaml", "-listen", ":11434", "-watch-config"]
    ports:
      - "11434:11434"
    volumes:
      # Mount the DIRECTORY (not the single file) so edits to config.yaml propagate into the
      # container and llama-swap -watch-config sees them. A single-file bind pins to the inode,
      # so atomic-save editors (write-temp+rename) leave the container reading the OLD file until
      # a restart. llama-swap still reads /config/config.yaml.
      - ./llama-cpp:/config:ro
      - /mnt/AI_Models/gguf:/models/gguf                     # friendly <name>.gguf symlinks (+ re-quants)
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface  # MiniMax/Mistral -hf cache (host downloads)
    restart: unless-stopped
    networks:
      lario-net:
        aliases:
          - ollama

  bifrost:
    image: maximhq/bifrost:v1.6.3   # pinned — do not ride `latest` (v2.0.0 prerelease exists)
    container_name: bifrost
    # Backend is native llama-swap; the `ollama:host-gateway` route is added in the
    # docker-compose.fedora-native.yml override. No depends_on (llamacpp is retired).
    ports:
      # loopback + Tailscale IP only — NOT 0.0.0.0 (docker-ce DNAT bypasses firewalld, and
      # the Bifrost admin API has no auth). Reach it from the Mac over Tailscale.
      - "127.0.0.1:8080:8080"
      - "100.120.6.24:8080:8080"
    volumes:
      - ./bifrost:/app/data
    restart: unless-stopped
    networks:
      - lario-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - lario-net

  rag_api:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface
    command: python /app/scripts/rag_api.py
    depends_on:
      - chromadb
      - bifrost
    restart: unless-stopped
    networks:
      - lario-net

  ml_pipeline:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: ml_pipeline
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - lario-net

networks:
  lario-net:
    name: lario-net
    driver: bridge
