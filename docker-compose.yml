services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /mnt/shared-models/ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - lario-net

  bifrost:
    image: maximhq/bifrost:latest
    container_name: bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost:/app/data
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - lario-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - lario-net

  rag_api:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8100:8100"
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/shared-models/huggingface:/root/.cache/huggingface
    command: python /app/scripts/rag_api.py
    depends_on:
      - chromadb
      - bifrost
    restart: unless-stopped
    networks:
      - lario-net

  ml_pipeline:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: ml_pipeline
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/shared-models/huggingface:/root/.cache/huggingface
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - lario-net

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    ports:
      - "8642:8642"
    volumes:
      - ./hermes-data:/home/node/.hermes
    environment:
      - OPENAI_BASE_URL=http://bifrost:8080/v1
      - OPENAI_API_KEY=local-bifrost
      - HERMES_AUTH_TOKEN=local-bifrost
      - OPENROUTER_API_KEY=not-used
    depends_on:
      - bifrost
    restart: unless-stopped
    networks:
      - lario-net

networks:
  lario-net:
    name: lario-net
    driver: bridge
