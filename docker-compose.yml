services:
  llamacpp:
    # llama.cpp + llama-swap, GPU via AMD ROCm.
    # GPU passthrough (/dev/kfd, /dev/dri, HSA_OVERRIDE) lives in the override file.
    # Image is built from ./llama-cpp (bundles the validated llama.cpp build + ROCm 7.2.1 + llama-swap).
    # See docs/strix_halo_fedora_setup.md.
    build: ./llama-cpp
    image: lario/llamacpp:latest
    container_name: llamacpp
    command: ["llama-swap", "-config", "/config/config.yaml", "-listen", ":11434", "-watch-config"]
    ports:
      - "11434:11434"
    volumes:
      # Mount the DIRECTORY (not the single file) so edits to config.yaml propagate into the
      # container and llama-swap -watch-config sees them. A single-file bind pins to the inode,
      # so atomic-save editors (write-temp+rename) leave the container reading the OLD file until
      # a restart. llama-swap still reads /config/config.yaml.
      - ./llama-cpp:/config:ro
      - /mnt/AI_Models/gguf:/models/gguf                     # friendly <name>.gguf symlinks (+ re-quants)
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface  # MiniMax/Mistral -hf cache (host downloads)
    restart: unless-stopped
    networks:
      - lario-net

  bifrost:
    image: maximhq/bifrost:latest
    container_name: bifrost
    ports:
      - "8080:8080"
    volumes:
      - ./bifrost:/app/data
    depends_on:
      - llamacpp
    restart: unless-stopped
    networks:
      - lario-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - lario-net

  rag_api:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8100:8100"
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface
    command: python /app/scripts/rag_api.py
    depends_on:
      - chromadb
      - bifrost
    restart: unless-stopped
    networks:
      - lario-net

  ml_pipeline:
    build:
      context: ./ml_env
      dockerfile: Dockerfile
    container_name: ml_pipeline
    volumes:
      - ./ml_env/scripts:/app/scripts
      - /mnt/AI_Models/huggingface:/root/.cache/huggingface
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - lario-net

networks:
  lario-net:
    name: lario-net
    driver: bridge
