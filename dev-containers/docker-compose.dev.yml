services:
  ubuntu:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu
    image: lario-dev-ubuntu:latest
    container_name: lario-dev-ubuntu
    hostname: dev-ubuntu
    ports:
      - "8441:8080"
    volumes:
      - ~/code:/workspace
      - ~/.ssh:/home/dev/.ssh:ro
      - ~/.gitconfig:/home/dev/.gitconfig:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/open-design:/home/dev/open-design
      - ~/palot:/home/dev/palot
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - SHELL=/bin/zsh
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lario-net
    stdin_open: true
    tty: true
    restart: unless-stopped

  pop:
    build:
      context: .
      dockerfile: Dockerfile.pop
    image: lario-dev-pop:latest
    container_name: lario-dev-pop
    hostname: dev-pop
    ports:
      - "8440:8080"
    volumes:
      - ~/code:/workspace
      - ~/.ssh:/home/dev/.ssh:ro
      - ~/.gitconfig:/home/dev/.gitconfig:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/open-design:/home/dev/open-design
      - ~/palot:/home/dev/palot
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - SHELL=/bin/zsh
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lario-net
    stdin_open: true
    tty: true
    restart: unless-stopped

  mint:
    build:
      context: .
      dockerfile: Dockerfile.mint
    image: lario-dev-mint:latest
    container_name: lario-dev-mint
    hostname: dev-mint
    ports:
      - "8442:8080"
    volumes:
      - ~/code:/workspace
      - ~/.ssh:/home/dev/.ssh:ro
      - ~/.gitconfig:/home/dev/.gitconfig:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/open-design:/home/dev/open-design
      - ~/palot:/home/dev/palot
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - SHELL=/bin/zsh
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lario-net
    stdin_open: true
    tty: true
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: lario-dev-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ubuntu
      - pop
      - mint
    networks:
      - lario-net
    restart: unless-stopped

networks:
  lario-net:
    external: true
