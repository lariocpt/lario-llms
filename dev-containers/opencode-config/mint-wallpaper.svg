<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Background Gradient: Obsidian & Mint Dark Forest -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f0c" />
      <stop offset="50%" stop-color="#141E17" />
      <stop offset="100%" stop-color="#080b09" />
    </linearGradient>
    
    <!-- Linux Mint Glowing Emerald/Mint Highlights -->
    <radialGradient id="mintGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#87CF3E" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#87CF3E" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="emeraldGlow" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#21A179" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#21A179" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bottomGlow" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#87CF3E" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#87CF3E" stop-opacity="0" />
    </radialGradient>

    <!-- Gradients for Curves -->
    <linearGradient id="curveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21A179" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#87CF3E" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#21A179" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="curveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#87CF3E" stop-opacity="0.02" />
      <stop offset="40%" stop-color="#21A179" stop-opacity="0.2" />
      <stop offset="80%" stop-color="#9EF01A" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#87CF3E" stop-opacity="0.02" />
    </linearGradient>
  </defs>

  <!-- Base Obsidian Canvas -->
  <rect width="1920" height="1080" fill="url(#bg)" />

  <!-- Ambient Glow Layer -->
  <rect width="1920" height="1080" fill="url(#mintGlow)" />
  <rect width="1920" height="1080" fill="url(#emeraldGlow)" />
  <rect width="1920" height="1080" fill="url(#bottomGlow)" />

  <!-- Abstract Tech Grid Lines -->
  <g opacity="0.06" stroke="#21A179" stroke-width="0.8">
    <line x1="0" y1="180" x2="1920" y2="180" stroke-dasharray="15,10" />
    <line x1="0" y1="360" x2="1920" y2="360" />
    <line x1="0" y1="540" x2="1920" y2="540" stroke-dasharray="8,8" />
    <line x1="0" y1="720" x2="1920" y2="720" />
    <line x1="0" y1="900" x2="1920" y2="900" stroke-dasharray="15,10" />
    
    <line x1="320" y1="0" x2="320" y2="1080" />
    <line x1="640" y1="0" x2="640" y2="1080" stroke-dasharray="15,10" />
    <line x1="960" y1="0" x2="960" y2="1080" />
    <line x1="1280" y1="0" x2="1280" y2="1080" stroke-dasharray="8,8" />
    <line x1="1600" y1="0" x2="1600" y2="1080" />
  </g>

  <!-- Elegant organic waves intersecting (representing Mint leaf curves) -->
  <path d="M-50,700 C400,500 800,900 1200,600 C1600,300 1800,800 2000,650" fill="none" stroke="url(#curveGrad1)" stroke-width="5" />
  <path d="M-50,730 C380,530 820,870 1220,580 C1620,280 1780,820 2000,680" fill="none" stroke="url(#curveGrad2)" stroke-width="2" />
  
  <path d="M-50,400 C300,200 700,600 1100,300 C1500,0 1700,500 2000,350" fill="none" stroke="url(#curveGrad1)" stroke-width="3" opacity="0.4" />

  <!-- Linux Mint Stylized 'LM' Leaf Branding in Center -->
  <g transform="translate(960, 540) scale(1.2)" opacity="0.8">
    <!-- Glowing Outer Branding Ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#87CF3E" stroke-width="1.5" stroke-dasharray="8,8" />
    <circle cx="0" cy="0" r="56" fill="none" stroke="#21A179" stroke-width="3" />
    <!-- Stylized Leaf/LM Shape -->
    <path d="M-20,-15 C-20,-30 -5,-35 15,-25 C30,-15 35,5 25,20 C15,35 -10,35 -20,20 Z" fill="none" stroke="#87CF3E" stroke-width="5" />
    <!-- LM Letterings in abstract form -->
    <path d="M-10,-10 L-10,15 L10,15" fill="none" stroke="#9EF01A" stroke-width="3.5" stroke-linecap="round" />
    <path d="M5,-10 L5,5 L15,-10 L15,10" fill="none" stroke="#9EF01A" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
