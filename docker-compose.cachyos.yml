# CachyOS topology override for the lario-llms compose stack.
#
# On CachyOS, llama.cpp + llama-swap run NATIVELY (Phase 3) — the `llamacpp` container
# is not started. But Bifrost's config.db and the agents still reference the provider
# base URL `http://ollama:11434` (the old container's network alias). This override maps
# `ollama` to the Docker host via host-gateway so every existing config keeps working
# with ZERO changes: the containers reach the native llama-swap on :11434.
#
# Install:  cp compose.cachyos-override.yml /mnt/Shared/personal/lario-llms/docker-compose.cachyos.yml
# Usage:    cd /mnt/Shared/personal/lario-llms && \
#           docker compose -f docker-compose.yml -f docker-compose.cachyos.yml \
#             up -d bifrost chromadb rag_api ml_pipeline
#           (never name `llamacpp` in the service list — and note that explicit -f flags
#            deliberately EXCLUDE the old docker-compose.override.yml, which held the
#            Fedora-era GPU spoof for the llamacpp container)
#
# Native llama-swap listens on :11434 on all interfaces (-listen :11434), so the docker
# bridge can reach it. Keep the LAN firewall in mind — see 04-bifrost.md.

services:
  bifrost:
    image: maximhq/bifrost:v1.6.3   # pin — v2.0.0 is imminent on the `latest` tag
    depends_on: []                  # llamacpp is native now
    # Replace the base file's port list: 100.120.6.24 was the old Fedora tailscale
    # node (offline); this machine's tailscale IP is 100.72.148.71. Loopback + tailnet
    # only — the Bifrost admin API has no auth, keep it off the LAN.
    ports: !override
      - "127.0.0.1:8080:8080"
      - "100.72.148.71:8080:8080"
    extra_hosts:
      - "ollama:host-gateway"
      - "host.docker.internal:host-gateway"

  rag_api:
    extra_hosts:
      - "ollama:host-gateway"
      - "host.docker.internal:host-gateway"
    # GPU passthrough for containerized torch (bundles its own older ROCm, so the spoof
    # is still correct INSIDE this container even though native builds don't use it):
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0

  ml_pipeline:
    extra_hosts:
      - "ollama:host-gateway"
      - "host.docker.internal:host-gateway"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
