# llama-swap — multi-model llama.cpp serving (drop-in for OpenAI /v1).
# Model set (Jul 2026): every model now streams from the /home HF cache via -hf (fresh GGUFs). 
# Vision models are addressed DIRECTLY (Bifrost doesn't split multimodal prompts). 
# GPU: AMD Strix Halo iGPU — 96 GB dedicated VRAM (BIOS UMA carveout) + only ~30 GB system RAM. 
# RULE: a model must fit in the 96 GB VRAM; only a few GB may spill to system RAM.

healthCheckTimeout: 900
logLevel: info

models:
  # Gemma-4 26B-A4B MoE (~16 GB) — fits fully on GPU → ~44 tok/s.
  "gemma4":
    aliases: ["gemma4:latest"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on --jinja
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_M -ngl 999 -c 65536
      --temp 1.0 --top-p 0.95 --top-k 64
    ttl: 600

  # Qwen 3.6 Coder 32B (~20 GB) — fits on GPU → fast dedicated coder.
  "qwen-3.6":
    aliases: ["qwen-3.6", "qwen-3.6:latest", "qwen3.6-coder"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on --jinja
      -hf unsloth/Qwen3.6-Coder-32B-Instruct-GGUF:Q4_K_M -ngl 999 -c 65536
      --temp 0.7 --top-p 0.8 --top-k 20 --repeat-penalty 1.05 --min-p 0.01
    ttl: 600

  # Llama-3.2-11B-Vision — OCR / documents / diagrams. Address directly.
  "llama-3.2-11b-vision":
    aliases: ["llama3.2-vision", "llama3.2-vision:latest"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on
      -hf unsloth/Llama-3.2-11B-Vision-Instruct-GGUF:Q4_K_M
      --mmproj /root/.cache/huggingface/mmproj/llama-3.2-11b-vision-mmproj.f16.gguf
      -ngl 999 -c 32768
    ttl: 600

  # Qwen2.5-VL 7B (vision) — OCR / documents / diagrams / multimodal math. Address directly.
  "qwen2.5-vl":
    aliases: ["qwen2.5-vl:latest", "qwen-vision"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on
      -hf unsloth/Qwen2.5-VL-7B-Instruct-GGUF:Q4_K_M
      --mmproj /root/.cache/huggingface/mmproj/qwen2.5-vl-mmproj.f16.gguf
      -ngl 999 -c 32768
    ttl: 600

  # Gemma-3 12B (vision) — general VQA / chart understanding / captioning. Address directly.
  "gemma3-vision":
    aliases: ["gemma-3-12b-vision", "gemma3-vl"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on
      -hf unsloth/gemma-3-12b-it-GGUF:Q4_K_M
      --mmproj /root/.cache/huggingface/mmproj/gemma-3-12b-mmproj.f16.gguf
      -ngl 999 -c 16384
    ttl: 600

  # MiniMax-M2.7 UD-Q3_K_S (87 GB MoE, 62 layers / 256 experts) — fits FULLY in 96 GB VRAM → all layers
  # on GPU, NO --n-cpu-moe. Verified ~18 tok/s on the iGPU (GPU busy 60-99%). This is the usable heavy
  # reasoner on this box.
  "minimax-m2":
    aliases: ["unsloth/MiniMax-M2.7", "minimax-m2:latest", "minimax"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} --prio 3 -fa on --jinja
      -hf unsloth/MiniMax-M2.7-GGUF:UD-Q3_K_S -ngl 999 -c 65536 -dio
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 1.0 --top-p 0.95 --min-p 0.01 --top-k 40
    ttl: 0

  # Mistral-Medium-3.5-128B (79 GB dense) — fits fully in 96 GB VRAM.
  "mistral-medium-3.5":
    aliases: ["mistral-medium", "mistral-medium-3.5:latest"]
    cmd: |
      llama-server --host 127.0.0.1 --port ${PORT} -fa on --jinja
      -hf bartowski/mistralai_Mistral-Medium-3.5-128B-GGUF:Q4_K_M -ngl 999 -c 65536 -dio
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 0.7 --top-p 0.95
    ttl: 300
