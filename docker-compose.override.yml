services:
  llamacpp:
    # Pass through the AMD GPU nodes (same as the old ollama:rocm setup).
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      # gfx1151 (Strix Halo) → spoof gfx1102 so ROCm/rocBLAS kernels apply. Also baked into the image.
      - HSA_OVERRIDE_GFX_VERSION=11.0.2
    volumes:
      - /usr/share/libdrm:/usr/share/libdrm:ro
    extra_hosts:
      - "localhost:127.0.0.1"
    
  rag_api:
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0

  ml_pipeline:
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
