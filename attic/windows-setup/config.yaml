# llama-swap — FAST Configuration
# Optimized for quick tasks and many offline agents.
# VRAM footprint is kept modest to allow multiple concurrent requests and fast token generation.

healthCheckTimeout: 900
logLevel: info

models:
  # Gemma 4 31B BF16 (~62 GB VRAM) — Excellent speed and quality balance
  "gemma4":
    aliases: ["gemma4:latest", "gemma-4-31b", "smart", "bifrost/smart", "bifrost/gemma4"]
    cmd: |
      llama-server --host localhost --port ${PORT} -fa on --jinja
      -m models\gemma-4-31b-it-Q8_0.gguf -ngl 999 -c 65536
      --temp 1.0 --top-p 0.95 --top-k 64
    ttl: 600

  # Qwen 3.6 27B / Coder 32B — Faster MTP architecture, incredibly fast coder.
  "qwen-3.6":
    aliases: ["qwen-routing", "qwen-3.6", "qwen-3.6:latest", "qwen-3.6-27b", "bifrost/qwen-routing", "qwen3-coder:30b", "ollama/qwen3-coder:30b"]
    cmd: |
      llama-server --host localhost --port ${PORT} -fa on --jinja
      -m models\Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf -ngl 999 -c 65536
      --temp 0.7 --top-p 0.8 --top-k 20 --repeat-penalty 1.05 --min-p 0.01
    ttl: 600

  # Qwen2.5-VL 7B (vision) — OCR / documents / diagrams / multimodal math. Address directly.
  "qwen2.5-vl":
    aliases: ["qwen2.5-vl:latest", "qwen-vision"]
    cmd: |
      llama-server --host localhost --port ${PORT} -fa on
      -m models\Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
      --mmproj models\mmproj-F16.gguf
      -ngl 999 -c 32768
    ttl: 600

  # Gemma-3 12B (vision) — general VQA / chart understanding / captioning. Address directly.
  "gemma3-vision":
    aliases: ["gemma-3-12b-vision", "gemma3-vl"]
    cmd: |
      llama-server --host localhost --port ${PORT} -fa on
      -m models\gemma-3-12b-it-Q4_K_M.gguf
      --mmproj models\gemma-3-12b-it-mmproj-F16.gguf
      -ngl 999 -c 16384
    ttl: 600
